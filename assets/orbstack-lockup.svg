<svg xmlns="http://www.w3.org/2000/svg" width="126" height="24" viewBox="0 0 126 24" fill="none">
  <defs>
    <linearGradient id="bg" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BFD8FF"/>
      <stop offset="1" stop-color="#A7B6FF"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(10.5 8.8) rotate(43.5) scale(12.5)">
      <stop stop-color="#C68BFF"/>
      <stop offset="0.55" stop-color="#9860F7"/>
      <stop offset="0.82" stop-color="#BC3AF3"/>
      <stop offset="1" stop-color="#6C35D8"/>
    </radialGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(16 7.2) rotate(140) scale(8.4 5.2)">
      <stop stop-color="#F5E7FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F5E7FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="0" y="0" width="24" height="24" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="2" y="2" width="20" height="20" rx="5" fill="url(#bg)"/>
    <circle cx="12" cy="12" r="8" fill="url(#orb)"/>
    <ellipse cx="16.2" cy="8.2" rx="3.3" ry="5.1" transform="rotate(18 16.2 8.2)" fill="url(#glow)"/>
  </g>
  <text x="30" y="15.8" fill="#F5F5F5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">OrbStack</text>
</svg>
